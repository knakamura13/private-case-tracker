<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monarch — K-1 Case Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=monarch4">
<style>
  html, body { margin: 0; padding: 0; background: oklch(0.92 0.01 80); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="layout.jsx"></script>
<script type="text/babel" src="modal.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="timeline-tasks.jsx"></script>
<script type="text/babel" src="evidence-questions.jsx"></script>
<script type="text/babel" src="settings-auth.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const { DesignCanvas, DCSection, DCArtboard,
    DashboardCalm, DashboardStructured,
    TimelineView, TasksView, EvidenceView, QuestionsView,
    SettingsView, AuthLogin, AuthInvite, Onboarding,
    ModalInline } = window;

  return (
    <DesignCanvas
      title="Monarch — a K-1 case tracker for two"
      subtitle="A private workspace for the marriage license → green card journey. Named for the butterfly that crosses borders by instinct. Soft pastels with assigned meaning, asymmetric bento layouts, Trello-style editors.">
      <DCSection id="dashboard" title="01 · Dashboard">
        <DCArtboard id="dash" label="Dashboard" width={1320} height={1080}><DashboardStructured /></DCArtboard>
      </DCSection>
      <DCSection id="screens" title="02 · Application screens">
        <DCArtboard id="timeline"  label="Timeline"  width={1320} height={2880}><TimelineView /></DCArtboard>
        <DCArtboard id="tasks"     label="Tasks (board)" width={1320} height={960}><TasksView /></DCArtboard>
        <DCArtboard id="evidence"  label="Evidence"  width={1320} height={1080}><EvidenceView /></DCArtboard>
        <DCArtboard id="questions" label="Questions" width={1320} height={900}><QuestionsView /></DCArtboard>
        <DCArtboard id="settings"  label="Settings"  width={1320} height={1080}><SettingsView /></DCArtboard>
      </DCSection>
      <DCSection id="modals" title="03 · Add / Edit modals (Trello-inspired)">
        <DCArtboard id="m-task"      label="Modal · Task"      width={760} height={1100}><div className="bloom" style={{padding:32, background:"oklch(0.20 0.02 270 / 0.32)"}}><ModalInline kind="task" /></div></DCArtboard>
        <DCArtboard id="m-milestone" label="Modal · Milestone" width={760} height={900}><div className="bloom" style={{padding:32, background:"oklch(0.20 0.02 270 / 0.32)"}}><ModalInline kind="milestone" /></div></DCArtboard>
        <DCArtboard id="m-question"  label="Modal · Question"  width={760} height={900}><div className="bloom" style={{padding:32, background:"oklch(0.20 0.02 270 / 0.32)"}}><ModalInline kind="question" /></div></DCArtboard>
      </DCSection>
      <DCSection id="auth" title="04 · Auth & onboarding">
        <DCArtboard id="login"      label="Login"      width={900}  height={900}><AuthLogin /></DCArtboard>
        <DCArtboard id="invite"     label="Invite"     width={900}  height={900}><AuthInvite /></DCArtboard>
        <DCArtboard id="onboarding" label="Onboarding" width={1080} height={1080}><Onboarding /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
