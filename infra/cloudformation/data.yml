AWSTemplateFormatVersion: '2010-09-09'
Description: Private Case Tracker - data layer (DynamoDB + S3) with backups, versioning, and auditing.

Parameters:
    AppName:
        Type: String
        Default: private-case-tracker
    DynamoTableName:
        Type: String
        Default: private-case-tracker
    S3BucketName:
        Type: String
        Default: private-case-tracker-data
    NoncurrentVersionRetentionDays:
        Type: Number
        Default: 365
    BackupRetentionDays:
        Type: Number
        Default: 365
    EnableCloudTrail:
        Type: String
        AllowedValues: ['true', 'false']
        Default: 'true'
    EnableGuardDuty:
        Type: String
        AllowedValues: ['true', 'false']
        Default: 'true'

Conditions:
    CreateCloudTrail: !Equals [!Ref EnableCloudTrail, 'true']
    CreateGuardDuty: !Equals [!Ref EnableGuardDuty, 'true']

Resources:
    # ---- KMS ----
    DataKey:
        Type: AWS::KMS::Key
        Properties:
            Description: !Sub '${AppName} data encryption key'
            EnableKeyRotation: true
            KeyPolicy:
                Version: '2012-10-17'
                Statement:
                    - Sid: AllowAccountAdmin
                      Effect: Allow
                      Principal:
                          AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
                      Action:
                          - 'kms:Encrypt'
                          - 'kms:Decrypt'
                          - 'kms:GenerateDataKey'
                          - 'kms:GenerateDataKeyWithoutPlaintext'
                          - 'kms:DescribeKey'
                          - 'kms:CreateGrant'
                          - 'kms:RevokeGrant'
                      Resource:
                          - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/${DataKey}'

    DataKeyAlias:
        Type: AWS::KMS::Alias
        Properties:
            AliasName: !Sub 'alias/${AppName}-data'
            TargetKeyId: !Ref DataKey

    # ---- DynamoDB ----
    DynamoTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: !Ref DynamoTableName
            BillingMode: PAY_PER_REQUEST
            SSESpecification:
                SSEEnabled: true
                SSEType: KMS
                KMSMasterKeyId: !Ref DataKey
            PointInTimeRecoverySpecification:
                PointInTimeRecoveryEnabled: true
            AttributeDefinitions:
                - AttributeName: PK
                  AttributeType: S
                - AttributeName: SK
                  AttributeType: S
                - AttributeName: GSI1PK
                  AttributeType: S
                - AttributeName: GSI1SK
                  AttributeType: S
                - AttributeName: GSI2PK
                  AttributeType: S
                - AttributeName: GSI2SK
                  AttributeType: S
                - AttributeName: GSI3PK
                  AttributeType: S
                - AttributeName: GSI3SK
                  AttributeType: S
            KeySchema:
                - AttributeName: PK
                  KeyType: HASH
                - AttributeName: SK
                  KeyType: RANGE
            GlobalSecondaryIndexes:
                - IndexName: GSI1
                  KeySchema:
                      - AttributeName: GSI1PK
                        KeyType: HASH
                      - AttributeName: GSI1SK
                        KeyType: RANGE
                  Projection:
                      ProjectionType: ALL
                # GSI2: Email-based lookups for Better Auth (user by email, account by email)
                - IndexName: GSI2
                  KeySchema:
                      - AttributeName: GSI2PK
                        KeyType: HASH
                      - AttributeName: GSI2SK
                        KeyType: RANGE
                  Projection:
                      ProjectionType: ALL
                # GSI3: Token-based lookups for Better Auth (session by token, verification by token)
                - IndexName: GSI3
                  KeySchema:
                      - AttributeName: GSI3PK
                        KeyType: HASH
                      - AttributeName: GSI3SK
                        KeyType: RANGE
                  Projection:
                      ProjectionType: ALL

    # ---- S3 ----
    DataBucket:
        Type: AWS::S3::Bucket
        Properties:
            BucketName: !Ref S3BucketName
            VersioningConfiguration:
                Status: Enabled
            PublicAccessBlockConfiguration:
                BlockPublicAcls: true
                IgnorePublicAcls: true
                BlockPublicPolicy: true
                RestrictPublicBuckets: true
            BucketEncryption:
                ServerSideEncryptionConfiguration:
                    - ServerSideEncryptionByDefault:
                          SSEAlgorithm: aws:kms
                          KMSMasterKeyID: !Ref DataKey
            LifecycleConfiguration:
                Rules:
                    - Id: NoncurrentVersionRetention
                      Status: Enabled
                      NoncurrentVersionExpiration:
                          NoncurrentDays: !Ref NoncurrentVersionRetentionDays
                    - Id: AbortIncompleteMultipartUpload
                      Status: Enabled
                      AbortIncompleteMultipartUpload:
                          DaysAfterInitiation: 7

    # ---- AWS Backup (scheduled on-demand backups) ----
    BackupVault:
        Type: AWS::Backup::BackupVault
        Properties:
            BackupVaultName: !Sub '${AppName}-vault'
            EncryptionKeyArn: !GetAtt DataKey.Arn

    BackupRole:
        Type: AWS::IAM::Role
        Properties:
            AssumeRolePolicyDocument:
                Version: '2012-10-17'
                Statement:
                    - Effect: Allow
                      Principal:
                          Service: backup.amazonaws.com
                      Action: sts:AssumeRole
            ManagedPolicyArns:
                - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
                - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores

    BackupPlan:
        Type: AWS::Backup::BackupPlan
        Properties:
            BackupPlan:
                BackupPlanName: !Sub '${AppName}-weekly'
                BackupPlanRule:
                    - RuleName: WeeklyFullBackup
                      TargetBackupVault: !Ref BackupVault
                      ScheduleExpression: 'cron(0 5 ? * 1 *)'
                      StartWindowMinutes: 60
                      CompletionWindowMinutes: 180
                      Lifecycle:
                          DeleteAfterDays: !Ref BackupRetentionDays

    BackupSelection:
        Type: AWS::Backup::BackupSelection
        Properties:
            BackupPlanId: !Ref BackupPlan
            BackupSelection:
                SelectionName: !Sub '${AppName}-dynamodb-selection'
                IamRoleArn: !GetAtt BackupRole.Arn
                Resources:
                    - !GetAtt DynamoTable.Arn

    # ---- CloudWatch alarms ----
    DynamoThrottleAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AppName}-dynamo-throttles'
            AlarmDescription: DynamoDB throttled requests on the app table
            Namespace: AWS/DynamoDB
            MetricName: ThrottledRequests
            Dimensions:
                - Name: TableName
                  Value: !Ref DynamoTable
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching

    DynamoSystemErrorsAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AppName}-dynamo-system-errors'
            AlarmDescription: DynamoDB 5xx errors on the app table
            Namespace: AWS/DynamoDB
            MetricName: SystemErrors
            Dimensions:
                - Name: TableName
                  Value: !Ref DynamoTable
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching

    # ---- CloudTrail (optional) ----
    CloudTrailBucket:
        Type: AWS::S3::Bucket
        Condition: CreateCloudTrail
        Properties:
            BucketName: !Sub '${AppName}-cloudtrail-${AWS::AccountId}'
            VersioningConfiguration:
                Status: Enabled
            PublicAccessBlockConfiguration:
                BlockPublicAcls: true
                IgnorePublicAcls: true
                BlockPublicPolicy: true
                RestrictPublicBuckets: true
            BucketEncryption:
                ServerSideEncryptionConfiguration:
                    - ServerSideEncryptionByDefault:
                          SSEAlgorithm: AES256

    CloudTrailBucketPolicy:
        Type: AWS::S3::BucketPolicy
        Condition: CreateCloudTrail
        Properties:
            Bucket: !Ref CloudTrailBucket
            PolicyDocument:
                Version: '2012-10-17'
                Statement:
                    - Sid: AWSCloudTrailAclCheck
                      Effect: Allow
                      Principal:
                          Service: cloudtrail.amazonaws.com
                      Action: s3:GetBucketAcl
                      Resource: !GetAtt CloudTrailBucket.Arn
                    - Sid: AWSCloudTrailWrite
                      Effect: Allow
                      Principal:
                          Service: cloudtrail.amazonaws.com
                      Action: s3:PutObject
                      Resource: !Sub '${CloudTrailBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
                      Condition:
                          StringEquals:
                              s3:x-amz-acl: bucket-owner-full-control

    Trail:
        Type: AWS::CloudTrail::Trail
        Condition: CreateCloudTrail
        DependsOn: CloudTrailBucketPolicy
        Properties:
            TrailName: !Sub '${AppName}-trail'
            S3BucketName: !Ref CloudTrailBucket
            IsLogging: true
            IsMultiRegionTrail: true
            IncludeGlobalServiceEvents: true
            EnableLogFileValidation: true

    # ---- GuardDuty (optional) ----
    GuardDutyDetector:
        Type: AWS::GuardDuty::Detector
        Condition: CreateGuardDuty
        Properties:
            Enable: true
            FindingPublishingFrequency: FIFTEEN_MINUTES

Outputs:
    DynamoTableName:
        Value: !Ref DynamoTable
    DynamoTableArn:
        Value: !GetAtt DynamoTable.Arn
    S3BucketName:
        Value: !Ref DataBucket
    KmsKeyArn:
        Value: !GetAtt DataKey.Arn
    BackupVaultName:
        Value: !Ref BackupVault
