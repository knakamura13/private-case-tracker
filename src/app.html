<!doctype html>
<html lang="en" class="app-html">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" />
        <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
        <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
        <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
        <meta name="theme-color" content="#f5f0e8" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
        <meta name="color-scheme" content="light" />
        <meta name="robots" content="noindex,nofollow" />

        <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
        <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
            rel="stylesheet"
        />

        <title>Monarch</title>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover" class="app-body" style="background: #f5f0e8">
        <div id="app" style="display: contents">%sveltekit.body%</div>
    </body>
</html>
